<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Bitcoiner Travelling — World Map</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{font-family:'Inter','Roboto',sans-serif}
body{background:#030712;overflow-x:hidden}
.pb{border:2px solid #1f2937;box-shadow:inset 0 0 0 1px rgba(255,255,255,0.05)}
.toast{animation:ft 2.5s ease forwards}
@keyframes ft{0%{opacity:0;transform:translateY(10px)}12%{opacity:1;transform:translateY(0)}88%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-10px)}}
.modal-overlay{background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);transition:opacity 0.3s ease}
.country-btn{cursor:pointer;transition:all 0.2s ease;position:relative;border-radius:4px;font-size:9px;line-height:1.1;display:flex;align-items:center;justify-content:center;text-align:center;font-weight:600;overflow:hidden;min-height:20px;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.country-btn:hover{z-index:5;transform:scale(1.12);box-shadow:0 0 20px rgba(255,255,255,0.2)}
.country-btn.unlocked{background:rgba(75,85,99,0.4)!important;border-color:#6b7280!important;opacity:0.7!important}
.country-btn.unlocked::after{content:'¹3';position:absolute;top:1px;right:2px;font-size:7px;color:#9ca3af}
.country-btn.selected{z-index:10!important;box-shadow:0 0 0 2px #f59e0b,0 0 16px rgba(245,158,11,0.5)!important;transform:scale(1.05)}
.map-grid{display:grid;grid-template-columns:repeat(36,1fr);gap:3px;padding:6px;background:radial-gradient(ellipse at 50% 50%,#0c1929,#030712);border-radius:12px;touch-action:manipulation;position:relative}
.map-container{width:100%;min-height:120px;touch-action:manipulation;position:relative}@media(min-width:1024px){.map-container{min-height:0}}
.map-overlay{position:absolute;top:6px;left:6px;width:calc(100% - 12px);height:calc(100% - 12px);pointer-events:none;z-index:6}
.travel-line{stroke:#f59e0b;stroke-width:0.08;stroke-linecap:round;stroke-linejoin:round;fill:none;opacity:0.7}
.travel-line-glow{stroke:#f59e0b;stroke-width:0.18;stroke-linecap:round;stroke-linejoin:round;fill:none;opacity:0.2}
.avatar-marker{font-size:0.6px;dominant-baseline:central;text-anchor:middle}
.continent-na{background:radial-gradient(ellipse at 50% 50%,rgba(59,130,246,0.15),transparent)}
.continent-eu{background:radial-gradient(ellipse at 50% 50%,rgba(139,92,246,0.15),transparent)}
.continent-as{background:radial-gradient(ellipse at 50% 50%,rgba(245,158,11,0.15),transparent)}
.continent-sa{background:radial-gradient(ellipse at 50% 50%,rgba(16,185,129,0.15),transparent)}
.continent-me{background:radial-gradient(ellipse at 50% 50%,rgba(244,63,94,0.15),transparent)}
.continent-af{background:radial-gradient(ellipse at 50% 50%,rgba(234,88,12,0.15),transparent)}
.continent-oc{background:radial-gradient(ellipse at 50% 50%,rgba(6,182,212,0.15),transparent)}
.continent-la{background:radial-gradient(ellipse at 50% 50%,rgba(34,197,94,0.15),transparent)}
.bar-up{background:linear-gradient(180deg,#10b981,#047857)}
.bar-down{background:linear-gradient(180deg,#ef4444,#991b1b)}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:#111827}
::-webkit-scrollbar-thumb{background:#374151;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#4b5563}

@media(max-width:767px){
  .country-btn{font-size:7px;border-radius:2px;min-height:30px}
  .country-btn:hover{transform:scale(1.06)}
  .map-grid{gap:2px;padding:4px}
  .modal-overlay{align-items:flex-end!important;padding:0!important}
  .modal-overlay>div{border-radius:16px 16px 0 0!important;max-height:85vh!important;margin-top:auto;transform:translateY(0);transition:transform 0.3s ease}
  .sheet-handle{width:36px;height:4px;background:#4b5563;border-radius:2px;margin:8px auto 4px;display:block}
  .touch-btn{min-height:44px!important;touch-action:manipulation}
  .avatar-btn{min-width:44px!important;min-height:44px!important;width:44px!important;height:44px!important;font-size:18px!important}
  .badge-touch{min-height:44px!important}
  .min-mobile-text{font-size:11px!important}
  .modal-overlay.hidden>div{transform:translateY(100%)}
}
@media(min-width:768px){
  .sheet-handle{display:none}
  .modal-overlay.hidden>div{transform:none}
}
</style>
</head>
<body class="min-h-screen text-gray-100">

<!-- LEFT COLUMN: Map -->
<div class="lg:col-span-10">

    </div>
    <div class="map-grid" id="mapGrid" style="position:relative">
      <!-- Countries rendered by JS -->
      <svg class="map-overlay" id="travelOverlay" viewBox="0 0 36 16" preserveAspectRatio="none">
        <path class="travel-line-glow" id="travelGlow"/>
        <path class="travel-line" id="travelLine"/>
        <text class="avatar-marker" id="avatarMarker"></text>

</div>

<!-- RIGHT COLUMN: Sidebar (desktop) -->

<div id="toast" class="fixed bottom-4 left-1/2 -translate-x-1/2 bg-gray-800 text-emerald-400 px-2.5 py-1 rounded-lg text-[9px] font-semibold pb toast hidden z-50 whitespace-nowrap min-mobile-text"></div>

function rM(){
  var g=document.getElementById("mapGrid");
  // Remove all country buttons but keep the SVG overlay
  g.querySelectorAll(".country-btn").forEach(function(el){el.remove();});
  var svg=g.querySelector(".map-overlay");
  // If no svg, create it
  if(!svg){
    var ns="http://www.w3.org/2000/svg";
    svg=document.createElementNS(ns,"svg");
    svg.setAttribute("class","map-overlay");
    svg.setAttribute("id","travelOverlay");
    svg.setAttribute("viewBox","0 0 36 16");
    svg.setAttribute("preserveAspectRatio","none");
    svg.innerHTML='<path class="travel-line-glow" id="travelGlow"/><path class="travel-line" id="travelLine"/><text class="avatar-marker" id="avatarMarker"></text>';
    g.prepend(svg);
  }
  
  for(var i=0;i<CD.length;i++){
    var c=CD[i];var d=st[c.i]||{};
    var cc=CC[c.c];
    var div=document.createElement("div");
    div.style.gridColumn=c.x+" / span "+c.w;
    div.style.gridRow=c.y+" / span "+c.h;
    div.className="country-btn rounded border"+(d.u?" unlocked":"");
    div.style.background=d.u?"rgba(75,85,99,0.35)":cc.bg;
    div.style.borderColor=d.u?"#6b7280":cc.border;
    div.style.color=d.u?"#9ca3af":cc.text;
    div.style.fontSize=Math.min(10,Math.max(6,c.w*2.5))+"px";
    div.textContent=c.n;
    div.dataset.iso=c.i;
    div.addEventListener("click",(function(iso){return function(){oM(iso);};})(c.i));
    g.appendChild(div);
  }
  // Draw travel trajectory
  drawTrajectory();
  // Update BTC price
  fetchBTC();
}

function drawTrajectory(){
  var vo=st.vo||[];
  if(vo.length<2){
    var gl=document.getElementById("travelGlow");if(gl)gl.setAttribute("d","");
    var tl=document.getElementById("travelLine");if(tl)tl.setAttribute("d","");
    var am=document.getElementById("avatarMarker");if(am)am.textContent="";
    return;
  }
  var pts=[];
  for(var i=0;i<vo.length;i++){
    var c=CD.find(function(x){return x.i===vo[i];});
    if(c)pts.push({x:c.x+c.w/2,y:c.y+c.h/2});
  }
  if(pts.length<2)return;
  var d="M"+pts[0].x+" "+pts[0].y;
  for(var i=1;i<pts.length;i++)d+=" L"+pts[i].x+" "+pts[i].y;
  document.getElementById("travelGlow").setAttribute("d",d);
  document.getElementById("travelLine").setAttribute("d",d);
  // Avatar at last point
  var last=pts[pts.length-1];
  var am=document.getElementById("avatarMarker");
  var avatars={boy:"\uD83E\uDDD1",girl:"\uD83D\uDC69",cat:"\uD83D\uDC31",dog:"\uD83D\uDC36"};
  am.textContent=avatars[st.av]||"\uD83E\uDDD1";
  am.setAttribute("x",last.x);
  am.setAttribute("y",last.y);
}

function fetchBTC(){
  fetch("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd")
    .then(function(r){return r.json();})
    .then(function(d){if(d&&d.bitcoin)document.getElementById("btcPrice").textContent="$"+d.bitcoin.usd.toLocaleString();})
    .catch(function(){});
}

    nfText.textContent=bd.news_flash;
    nfEl.classList.remove("hidden");
  } else { nfEl.classList.add("hidden"); }
  
  // Chart
  var baseVal=100;
  var change4yr=bd["4yr"]||0;
  var annualChange=Math.pow(change4yr/100+1,0.25)-1;
  var years=[2021,2022,2023,2024,2025];
  var vals=[];
  for(var yi=0;yi<5;yi++){

  }
  var changePct=Math.round((vals[4]-vals[0])/vals[0]*100);

  var cb=document.getElementById("chartBars");cb.innerHTML="";

    var bar=document.createElement("div");

    bar.style.height=pct+"%";
    bar.style.minHeight="4px";
    bar.title=vals[yi].toLocaleString();
    cb.appendChild(bar);
  }
  
  // Activities
  var acts=document.getElementById("activities");acts.innerHTML="";
