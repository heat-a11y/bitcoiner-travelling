<style>
*{font-family:'Inter','Roboto',sans-serif}
body{background:#030712;overflow-x:hidden}
.pb{border:2px solid #1f2937;box-shadow:inset 0 0 0 1px rgba(255,255,255,0.05)}
.toast{animation:ft 2.5s ease forwards}
@keyframes ft{0%{opacity:0;transform:translateY(10px)}12%{opacity:1;transform:translateY(0)}88%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-10px)}}
.modal-overlay{background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);transition:opacity 0.3s ease}
.country-btn{cursor:pointer;transition:all 0.2s ease;position:relative;border-radius:4px;font-size:9px;line-height:1.1;display:flex;align-items:center;justify-content:center;text-align:center;font-weight:600;overflow:hidden;min-height:20px;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.country-btn:hover{z-index:5;transform:scale(1.12);box-shadow:0 0 20px rgba(255,255,255,0.2)}
.country-btn.unlocked{background:rgba(16,185,129,0.5)!important;border-color:#10b981!important}
.country-btn.unlocked::after{content:'¹3';position:absolute;top:1px;right:2px;font-size:7px;color:#6ee7b7}
.map-grid{display:grid;grid-template-columns:repeat(36,1fr);gap:2px;padding:4px;background:radial-gradient(ellipse at 50% 50%,#0c1929,#030712);border-radius:12px;touch-action:manipulation}
.map-container{width:100%;min-height:120px;touch-action:manipulation}@media(min-width:1024px){.map-container{min-height:0}}
.continent-na{background:radial-gradient(ellipse at 50% 50%,rgba(59,130,246,0.15),transparent)}
.continent-eu{background:radial-gradient(ellipse at 50% 50%,rgba(139,92,246,0.15),transparent)}
.continent-as{background:radial-gradient(ellipse at 50% 50%,rgba(245,158,11,0.15),transparent)}
.continent-sa{background:radial-gradient(ellipse at 50% 50%,rgba(16,185,129,0.15),transparent)}
.continent-me{background:radial-gradient(ellipse at 50% 50%,rgba(244,63,94,0.15),transparent)}
.continent-af{background:radial-gradient(ellipse at 50% 50%,rgba(234,88,12,0.15),transparent)}
.continent-oc{background:radial-gradient(ellipse at 50% 50%,rgba(6,182,212,0.15),transparent)}
.continent-la{background:radial-gradient(ellipse at 50% 50%,rgba(34,197,94,0.15),transparent)}
.bar-up{background:linear-gradient(180deg,#10b981,#047857)}
.bar-down{background:linear-gradient(180deg,#ef4444,#991b1b)}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:#111827}
::-webkit-scrollbar-thumb{background:#374151;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#4b5563}
.country-fallback{scrollbar-width:thin;scrollbar-color:#374151 transparent}
.country-fallback::-webkit-scrollbar{height:4px}
.country-fallback::-webkit-scrollbar-thumb{background:#374151;border-radius:2px}
@media(max-width:767px){
  .country-btn{font-size:7px;border-radius:2px;min-height:30px}
  .country-btn:hover{transform:scale(1.06)}
  .map-grid{gap:1px;padding:2px}
  .modal-overlay{align-items:flex-end!important;padding:0!important}
  .modal-overlay>div{border-radius:16px 16px 0 0!important;max-height:85vh!important;margin-top:auto;transform:translateY(0);transition:transform 0.3s ease}
  .sheet-handle{width:36px;height:4px;background:#4b5563;border-radius:2px;margin:8px auto 4px;display:block}
  .touch-btn{min-height:44px!important;touch-action:manipulation}
  .avatar-btn{min-width:44px!important;min-height:44px!important;width:44px!important;height:44px!important;font-size:18px!important}
  .badge-touch{min-height:44px!important}
  .min-mobile-text{font-size:11px!important}
  .modal-overlay.hidden>div{transform:translateY(100%)}
}
@media(min-width:768px){
  .sheet-handle{display:none}
  .modal-overlay.hidden>div{transform:none}
}

  var cb=document.getElementById("chartBars");cb.innerHTML="";
  var maxVal=Math.max.apply(null,vals);
  for(var yi=0;yi<vals.length;yi++){
    var bar=document.createElement("div");
    bar.className="flex-1 rounded-t-sm "+(isUp?"bar-up":"bar-down");
    var pct=Math.max(5,vals[yi]/maxVal*100);
    bar.style.height=pct+"%";
    bar.style.minHeight="4px";
    bar.title=vals[yi].toLocaleString();
    cb.appendChild(bar);
  }
  
  // Activities
  var acts=document.getElementById("activities");acts.innerHTML="";
  var cats=["culinary","culture","transit","bitcoin"];
  var saved=d.acts||[];
  for(var ci=0;ci<cats.length;ci++){
    var cat=cats[ci];
    var options=AD[cat]||[];
    var selected=options[Math.floor(Math.random()*options.length)];
    if(saved.length>ci)selected=saved[ci];
    var sel=saved.indexOf(selected)>=0;
    var label=document.createElement("label");
    label.className="opt flex items-center gap-2 p-2 rounded bg-gray-800 cursor-pointer border "+(sel?"border-emerald-500":"border-gray-700")+" hover:border-emerald-500 transition touch-btn";
    var cb2=document.createElement("input");cb2.type="checkbox";cb2.className="ac w-4 h-4 rounded accent-emerald-500 cursor-pointer shrink-0";
    cb2.dataset.text=selected;cb2.dataset.cat=cat;cb2.checked=sel;
    var sp=document.createElement("span");sp.className="text-[10px] text-gray-200 min-mobile-text";sp.textContent=selected;
    label.appendChild(cb2);label.appendChild(sp);acts.appendChild(label);
  }
  
  document.getElementById("countryModal").dataset.iso=iso;
  document.getElementById("countryModal").classList.remove("hidden");
}

function cM(){document.getElementById("countryModal").classList.add("hidden");}

// Country fallback list for mobile
function rCF(){
  var el=document.getElementById("countryFallback");
  if(!el)return;
  el.innerHTML='<div class="text-[8px] text-gray-500 mb-1">🌍 Tap a country below:</div>'+
    '<div class="flex gap-1.5 overflow-x-auto pb-1 country-fallback" style="-webkit-overflow-scrolling:touch">'+
    CD.map(function(c){
      var cc=CC[c.c];
      var d=st[c.i]||{};
      return '<button class="touch-btn text-[10px] px-3 py-1.5 rounded-lg whitespace-nowrap border shrink-0 font-semibold" '+
        'style="background:'+(d.u?'rgba(16,185,129,0.5)':cc.bg)+';color:'+(d.u?'#6ee7b7':cc.text)+';border-color:'+(d.u?'#10b981':cc.border)+'" '+
        'data-iso="'+c.i+'">'+(d.u?'\u2713 ':'')+c.n+'</button>';
    }).join('')+'</div>';
  el.querySelectorAll('button').forEach(function(b){
    b.addEventListener('click',function(){oM(b.dataset.iso);});
  });
}

function sC(){
  var iso=document.getElementById("countryModal").dataset.iso;
  if(!st[iso])st[iso]={u:false,acts:[]};
  var d=st[iso];
  var acts=[];
  var cbs=document.querySelectorAll(".ac:checked");
  for(var i=0;i<cbs.length;i++)acts.push(cbs[i].dataset.text);
  var was=d.u;
  d.acts=acts;d.u=acts.length>0;
  if(d.u&&!was){if(!st.vo)st.vo=[];st.vo.push(iso);}
  st[iso]=d;pst();
  rL();rM();rCF();cM();
}

function pst(){localStorage.setItem("bt3",JSON.stringify(st));}

function rP(){if(confirm("Reset all progress?")){st={vo:[],av:st.av};pst();rL();rM();rCF();}}

function sT(m){
  var el=document.getElementById("toast");el.textContent=m;
  el.classList.remove("hidden","toast");void el.offsetWidth;el.classList.add("toast");
  setTimeout(function(){el.classList.add("hidden");},2700);
}

document.addEventListener("DOMContentLoaded",function(){
  rL();rM();rCF();
  
  document.querySelectorAll(".avatar-btn").forEach(function(b){
    b.addEventListener("click",function(){st.av=b.dataset.avatar;document.querySelectorAll(".avatar-btn").forEach(function(x){x.style.borderColor="transparent";});b.style.borderColor="#10b981";pst();});
    if(b.dataset.avatar===st.av)b.style.borderColor="#10b981";
  });
  
  document.getElementById("closeModal").addEventListener("click",cM);
  document.getElementById("saveBtn").addEventListener("click",sC);
  document.getElementById("resetBtn").addEventListener("click",rP);
  document.getElementById("copyBtn").addEventListener("click",function(){
    navigator.clipboard.writeText("bc1q47tl79lx5ua5hecnsj42d6whgk8hjlqvlv3jh7").then(function(){sT("Copied!");}).catch(function(){sT("Failed.");});
  });
  document.getElementById("countryModal").addEventListener("click",function(e){if(e.target===e.currentTarget)cM();});
  document.addEventListener("keydown",function(e){if(e.key==="Escape")cM();});
  
  // Bottom sheet swipe-to-close
  (function(){
    var modal=document.getElementById("countryModal");
    var content=modal.querySelector("div");
    var startY=0,startTranslate=0,isDragging=false;
    content.addEventListener("touchstart",function(e){
      if(window.innerWidth>=768)return;
      startY=e.touches[0].clientY;
      isDragging=true;
    },{passive:true});
    content.addEventListener("touchmove",function(e){
      if(!isDragging||window.innerWidth>=768)return;
      var dy=e.touches[0].clientY-startY;
      if(dy>0)content.style.transform="translateY("+dy+"px)";
    },{passive:true});
    content.addEventListener("touchend",function(e){
      if(!isDragging||window.innerWidth>=768)return;
      isDragging=false;
      var dy=e.changedTouches[0].clientY-startY;
      if(dy>100)cM();
      content.style.transform="";
    },{passive:true});
  })();
  
  // Refresh BTC price every 60s
  setInterval(fetchBTC,60000);
});

</script>
